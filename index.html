// ── URL Scraper ──────────────────────────────────────────────────────────────
function parseUrlHints(url){
  const result={name:"",address:"",neighborhood:"",bed:"",price:""};
  try{
    const u=new URL(url);
    const host=u.hostname.replace("www.","");
    const path=u.pathname;
    if(host.includes("streeteasy.com")){
      const bm=path.match(/\/building\/([^\/]+)/);
      if(bm) result.name=bm[1].split("-").map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(" ");
      const rm=path.match(/\/rental\/(\d+)/);
      if(rm) result.name=result.name||"StreetEasy #"+rm[1];
    } else if(host.includes("zillow.com")){
      const am=path.match(/\/homedetails\/([^\/]+)\//);
      if(am){const p=am[1].replace(/_/g,"-").split("-");result.address=p.slice(0,-1).join(" ");result.name=p.slice(0,3).join(" ")}
      const bm=path.match(/\/b\/([^\/]+)/);
      if(bm) result.name=bm[1].split("-").map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(" ");
    } else if(host.includes("apartments.com")){
      const nm=path.match(/\/([^\/]+)\/\d+/);
      if(nm) result.name=nm[1].split("-").map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(" ");
    } else {
      const seg=path.split("/").filter(Boolean);
      if(seg.length>0) result.name=seg[seg.length-1].split("-").map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(" ");
    }
  }catch{}
  return result;
}

const CORS_PROXIES=[
  url=>"https://api.allorigins.win/raw?url="+encodeURIComponent(url),
  url=>"https://corsproxy.io/?"+encodeURIComponent(url),
  url=>"https://api.codetabs.com/v1/proxy?quest="+encodeURIComponent(url),
];

async function scrapeUrl(url){
  const BLOCK_KEYWORDS=["access denied","captcha","blocked","forbidden","please verify","are you a robot","enable javascript","security check"];
  for(const proxy of CORS_PROXIES){
    try{
      const res=await fetch(proxy(url),{signal:AbortSignal.timeout(6000)});
      if(!res.ok)continue;
      const html=await res.text();
      if(html.length<200)continue;
      const lower=html.substring(0,2000).toLowerCase();
      if(BLOCK_KEYWORDS.some(kw=>lower.includes(kw))&&!lower.includes("og:title"))continue;
      const doc=new DOMParser().parseFromString(html,"text/html");
      const meta=(n)=>{const el=doc.querySelector('meta[property="'+n+'"],meta[name="'+n+'"]');return el?el.getAttribute("content")||"":""};
      const title=meta("og:title")||doc.title||"";
      const desc=meta("og:description")||meta("description")||"";
      const image=meta("og:image")||"";
      if(!title||/access denied|forbidden|blocked|error/i.test(title))continue;
      let price="";const pm=(desc+" "+title).match(/\$[\d,]+/);if(pm)price=pm[0].replace(/[$,]/g,"");
      let bed="";const bm=(desc+" "+title).match(/(\d)\s*(?:bed|br|bedroom)/i);if(bm)bed=bm[1]==="0"?"Studio":bm[1]+"BR";
      if(!bed&&(desc+" "+title).match(/studio/i))bed="Studio";
      let address="";const adm=(desc+" "+title).match(/\d+\s+[\w\s]+(?:St|Ave|Blvd|Rd|Dr|Pl|Way|Ct|Ln|Broadway|Street|Avenue)\b[^,]*/i);if(adm)address=adm[0].trim();
      let neighborhood="";const hm=(desc+" "+title).match(/(?:in|at)\s+([\w\s]+?)(?:\s*[,.|]|\s+for\s|\s+\d)/i);if(hm)neighborhood=hm[1].trim();
      const cleanTitle=title.replace(/\s*[-|].*(?:streeteasy|zillow|apartments\.com).*$/i,"").trim();
      return{name:cleanTitle,address,neighborhood,photoUrl:image,price,bed,description:desc.substring(0,200)};
    }catch{}
  }
  return null;
}

async function scrapeBuildingUrl(url){
  const BLOCK_KEYWORDS=["access denied","captcha","blocked","forbidden","please verify","are you a robot","security check"];
  for(const proxy of CORS_PROXIES){
    try{
      const res=await fetch(proxy(url),{signal:AbortSignal.timeout(8000)});
      if(!res.ok)continue;
      const html=await res.text();
      if(html.length<200)continue;
      const lower=html.substring(0,2000).toLowerCase();
      if(BLOCK_KEYWORDS.some(kw=>lower.includes(kw))&&!lower.includes("og:title"))continue;
      const doc=new DOMParser().parseFromString(html,"text/html");
      const meta=(n)=>{const el=doc.querySelector('meta[property="'+n+'"],meta[name="'+n+'"]');return el?el.getAttribute("content")||"":""};
      const title=meta("og:title")||doc.title||"";
      const desc=meta("og:description")||meta("description")||"";
      const image=meta("og:image")||"";
      if(!title||/access denied|forbidden|blocked|error/i.test(title))continue;
      const fullText=(title+" "+desc+" "+doc.body.innerText.substring(0,5000)).replace(/\s+/g," ");
      let name="";
      const parts=title.split(/\s*[|]\s*/);
      if(parts.length>=2){
        const clean=parts.map(p=>p.trim()).filter(p=>p.length>0);
        const nonGeneric=clean.filter(p=>!/^apartments?\s|for\s+rent|available|homes?\s/i.test(p));
        name=nonGeneric.length>0?nonGeneric[nonGeneric.length-1]:clean[clean.length-1];
      } else {
        name=title.replace(/\s*[-].*(apartments?|rent|nyc|new york|living|home|residence).*/i,"").trim();
      }
      name=name.replace(/\s*[-|].*$/,"").trim();
      let address="";
      const addrEl=doc.querySelector('[class*="address"],[class*="location"],[itemtype*="PostalAddress"]');
      if(addrEl)address=addrEl.textContent.replace(/\s+/g," ").trim().substring(0,100);
      if(!address){const am=fullText.match(/(\d+\s+[\w\s.]+(?:St(?:reet)?|Ave(?:nue)?|Blvd|Rd|Dr|Pl|Way|Ct|Ln|Broadway)[^,|]*)/i);if(am)address=am[1].trim();}
      address=address.replace(/\s*\|.*$/,"").trim();
      let neighborhood="";
      const nm=fullText.match(/(?:in|at|of)\s+(?:the\s+)?([\w\s]+?)(?:\s*[,.|]|\s+(?:NYC|New York|apartments?|neighborhood))/i);
      if(nm)neighborhood=nm[1].replace(/(?:the|our|this)\s*/i,"").trim();
      let phone="";
      const pm=fullText.match(/(\(?\d{3}\)?[\s.-]\d{3}[\s.-]\d{4})/);if(pm)phone=pm[1];
      const amenities={};
      const lowerFull=fullText.toLowerCase();
      if(/\b(?:doorman|concierge|door\s*man|24.?hour.*(?:door|lobby|staff))\b/i.test(lowerFull))amenities.Doorman=true;
      if(/\b(?:gym|fitness|work\s*out|exercise)\b/i.test(lowerFull))amenities.Gym=true;
      if(/\b(?:laundry|washer|dryer)\b/i.test(lowerFull))amenities.Laundry=true;
      if(/\b(?:roof(?:top)?|terrace|deck|sky\s*lounge)\b/i.test(lowerFull))amenities.Rooftop=true;
      if(/\b(?:pet|dog|cat)\b/i.test(lowerFull))amenities["Pet Policy"]=true;
      if(/\b(?:parking|garage|valet)\b/i.test(lowerFull))amenities.Parking=true;
      const otherAmenities=[];
      if(/\b(?:pool|swimming)\b/i.test(lowerFull))otherAmenities.push("Pool");
      if(/\b(?:lounge|club\s*room|resident.*lounge)\b/i.test(lowerFull))otherAmenities.push("Lounge");
      if(/\b(?:bike|cycling|bicycle)\b/i.test(lowerFull))otherAmenities.push("Bike Room");
      if(/\b(?:storage|closet)\b/i.test(lowerFull))otherAmenities.push("Storage");
      if(/\b(?:elevator)\b/i.test(lowerFull))otherAmenities.push("Elevator");
      if(otherAmenities.length)amenities.other=otherAmenities.join(", ");
      let minPrice="",maxPrice="";
      const prices=fullText.match(/\$[\d,]+/g);
      if(prices&&prices.length>0){
        const nums=prices.map(p=>parseInt(p.replace(/[$,]/g,""),10)).filter(n=>n>500&&n<50000).sort((a,b)=>a-b);
        if(nums.length>=2){minPrice=String(nums[0]);maxPrice=String(nums[nums.length-1]);}
        else if(nums.length===1)minPrice=String(nums[0]);
      }
      let bedTypes="";
      if(/studio/i.test(fullText))bedTypes+="Studio, ";
      const bedMatch=fullText.match(/(\w+(?:,\s*\w+)*(?:,?\s*and\s+\w+)?)[- ]bedroom/i);
      if(bedMatch)bedTypes+=bedMatch[0];
      else{if(/\bone\b.*bed/i.test(fullText)||/1[- ]?bed/i.test(fullText))bedTypes+="1BR, ";
        if(/\btwo\b.*bed/i.test(fullText)||/2[- ]?bed/i.test(fullText))bedTypes+="2BR, ";
        if(/\bthree\b.*bed/i.test(fullText)||/3[- ]?bed/i.test(fullText))bedTypes+="3BR, ";}
      return{name,address,neighborhood,photoUrl:image,phone,amenities,description:desc.substring(0,300),leasingDetails:{minPrice,maxPrice},bedTypes:bedTypes.replace(/,\s*$/,""),url};
    }catch{}
  }
  return null;
}

// ── Auth Screen ──────────────────────────────────────────────────────────────
function AuthScreen(){
  const[mode,setMode]=useState("login");
  const[email,setEmail]=useState("");
  const[password,setPassword]=useState("");
  const[displayName,setDisplayName]=useState("");
  const[error,setError]=useState("");
  const[loading,setLoading]=useState(false);

  const handleGoogle=async()=>{
    setError("");setLoading(true);
    try{
      const provider=new firebase.auth.GoogleAuthProvider();
      await auth.signInWithPopup(provider);
    }catch(e){setError(e.message)}
    setLoading(false);
  };

  const handleEmailLogin=async()=>{
    if(!email||!password){setError("Please fill in all fields");return}
    setError("");setLoading(true);
    try{
      await auth.signInWithEmailAndPassword(email,password);
    }catch(e){
      if(e.code==="auth/user-not-found")setError("No account found with this email");
      else if(e.code==="auth/wrong-password"||e.code==="auth/invalid-credential")setError("Incorrect password");
      else setError(e.message);
    }
    setLoading(false);
  };

  const handleEmailSignup=async()=>{
    if(!email||!password||!displayName){setError("Please fill in all fields");return}
    if(password.length<6){setError("Password must be at least 6 characters");return}
    setError("");setLoading(true);
    try{
      const cred=await auth.createUserWithEmailAndPassword(email,password);
      await cred.user.updateProfile({displayName});
      await cred.user.sendEmailVerification();
    }catch(e){
      if(e.code==="auth/email-already-in-use")setError("An account with this email already exists");
      else setError(e.message);
    }
    setLoading(false);
  };

  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#0a0a0a"}}>
      <div className="fade" style={{background:"#111",border:"1px solid #222",borderRadius:16,padding:40,width:400,maxWidth:"95vw"}}>
        <h1 style={{fontSize:28,fontWeight:700,marginBottom:4,letterSpacing:"-0.5px"}}>Borough</h1>
        <p style={{fontSize:13,color:"#666",marginBottom:28}}>Track your apartment hunt</p>

        {/* Google Sign-In */}
        <button onClick={handleGoogle} disabled={loading} style={{
          width:"100%",padding:12,background:"#fff",color:"#000",borderRadius:8,fontSize:13,fontWeight:600,marginBottom:16,
          display:"flex",alignItems:"center",justifyContent:"center",gap:10,opacity:loading?.6:1
        }}>
          <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Continue with Google
        </button>

        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
          <div style={{flex:1,height:1,background:"#222"}}/>
          <span style={{fontSize:11,color:"#555"}}>or</span>
          <div style={{flex:1,height:1,background:"#222"}}/>
        </div>

        {/* Email/Password */}
        {mode==="signup"&&(
          <Field label="Display Name">
            <input value={displayName} onChange={e=>setDisplayName(e.target.value)} placeholder="Your first name" autoFocus />
          </Field>
        )}
        <Field label="Email">
          <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@email.com" autoFocus={mode==="login"} />
        </Field>
        <Field label="Password">
          <input type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder={mode==="signup"?"At least 6 characters":"Your password"} onKeyDown={e=>{if(e.key==="Enter"){mode==="login"?handleEmailLogin():handleEmailSignup()}}} />
        </Field>

        {error&&<div style={{fontSize:12,color:"#ef4444",marginBottom:12,padding:10,background:"rgba(239,68,68,.08)",borderRadius:6}}>{error}</div>}

        <button onClick={mode==="login"?handleEmailLogin:handleEmailSignup} disabled={loading} style={{
          width:"100%",padding:12,background:"#fff",color:"#000",fontWeight:600,borderRadius:8,fontSize:13,marginBottom:16,opacity:loading?.6:1
        }}>
          {loading?"Please wait...":mode==="login"?"Sign In":"Create Account"}
        </button>

        <div style={{textAlign:"center",fontSize:12,color:"#555"}}>
          {mode==="login"?(
            <span>Don't have an account? <button onClick={()=>{setMode("signup");setError("")}} style={{color:"#38bdf8",background:"none",fontSize:12,textDecoration:"underline"}}>Sign up</button></span>
          ):(
            <span>Already have an account? <button onClick={()=>{setMode("login");setError("")}} style={{color:"#38bdf8",background:"none",fontSize:12,textDecoration:"underline"}}>Sign in</button></span>
          )}
        </div>
      </div>
    </div>
  );
}

// ── Verify Email Screen ──────────────────────────────────────────────────────
function VerifyEmailScreen({user}){
  const[sent,setSent]=useState(false);
  const[checking,setChecking]=useState(false);

  const resend=async()=>{
    try{await user.sendEmailVerification();setSent(true);setTimeout(()=>setSent(false),3000)}catch{}
  };

  const checkVerification=async()=>{
    setChecking(true);
    await user.reload();
    if(user.emailVerified)window.location.reload();
    else setChecking(false);
  };

  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#0a0a0a"}}>
      <div className="fade" style={{background:"#111",border:"1px solid #222",borderRadius:16,padding:40,width:420,maxWidth:"95vw",textAlign:"center"}}>
        <div style={{fontSize:40,marginBottom:16}}>✉️</div>
        <h2 style={{fontSize:20,fontWeight:700,marginBottom:8}}>Check your email</h2>
        <p style={{fontSize:13,color:"#888",marginBottom:24,lineHeight:1.6}}>
          We sent a verification link to <strong style={{color:"#fff"}}>{user.email}</strong>. Click the link in the email, then come back here.
        </p>
        <button onClick={checkVerification} disabled={checking} style={{
          width:"100%",padding:12,background:"#fff",color:"#000",fontWeight:600,borderRadius:8,fontSize:13,marginBottom:12,opacity:checking?.6:1
        }}>
          {checking?"Checking...":"I've verified my email"}
        </button>
        <button onClick={resend} style={{width:"100%",padding:10,background:"#161616",color:"#888",borderRadius:8,fontSize:12,border:"1px solid #222"}}>
          {sent?"Sent!":"Resend verification email"}
        </button>
        <button onClick={()=>auth.signOut()} style={{marginTop:16,background:"none",color:"#555",fontSize:12,textDecoration:"underline"}}>Sign out</button>
      </div>
    </div>
  );
}

// ── Listing Card (Kanban) ────────────────────────────────────────────────────
function ListingCard({listing,onClick,onDragStart,compareSelected,onCompareToggle}){
  const stage=STAGE_MAP[listing.stage]||STAGE_MAP.considering;
  const hasNotes=listing.notes&&listing.notes.trim();
  const eventCount=(listing.timeline||[]).length;
  const screenshots=getScreenshotsLocal(listing.id);
  const cardImage=listing.photoUrl||(screenshots.length>0?screenshots[0].data:"")||"";
  const isCompare=compareSelected||false;

  return(
    <div
      draggable
      onDragStart={(e)=>{e.dataTransfer.setData("text/plain",listing.id);onDragStart&&onDragStart(listing.id)}}
      onClick={()=>onClick(listing)}
      style={{
        background:"#161616",border:"1px solid "+(isCompare?"#38bdf8":"#222"),borderRadius:10,padding:14,marginBottom:10,cursor:"grab",
        transition:"all .15s",borderLeft:"3px solid "+stage.color,position:"relative",
      }}
      onMouseEnter={e=>{if(!isCompare)e.currentTarget.style.borderColor="#444";e.currentTarget.style.background="#1a1a1a"}}
      onMouseLeave={e=>{if(!isCompare)e.currentTarget.style.borderColor="#222";e.currentTarget.style.background="#161616";e.currentTarget.style.borderLeft="3px solid "+stage.color}}
    >
      {/* Compare checkbox */}
      <div className={"compare-check"+(isCompare?" active":"")} onClick={e=>{e.stopPropagation();onCompareToggle&&onCompareToggle(listing.id)}}>
        {isCompare&&<span style={{color:"#38bdf8",fontSize:14,fontWeight:700}}>✓</span>}
      </div>
      {cardImage&&(
        <div style={{marginBottom:10,borderRadius:6,overflow:"hidden",height:80,background:"#0a0a0a"}}>
          <img src={cardImage} style={{width:"100%",height:"100%",objectFit:"cover"}} onError={e=>{e.target.style.display="none"}} />
        </div>
      )}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
        <div style={{fontSize:14,fontWeight:600,lineHeight:1.3,flex:1}}>{listing.name||"Untitled"}</div>
        {listing.rating>0&&<div style={{fontSize:12,color:"#fbbf24",flexShrink:0,marginLeft:6}}>{"★".repeat(listing.rating)}<span style={{opacity:.3}}>{"★".repeat(5-listing.rating)}</span></div>}
      </div>
      {listing.address&&<div style={{fontSize:11,color:"#888",marginBottom:4}}>{listing.address}</div>}
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:8}}>
        {listing.price&&<span style={{fontSize:12,background:"#1a2a1a",color:"#34d399",padding:"3px 10px",borderRadius:4,fontWeight:500}}>${Number(listing.price).toLocaleString()}/mo</span>}
        {listing.bed&&<span style={{fontSize:12,background:"#1a1a2a",color:"#818cf8",padding:"3px 10px",borderRadius:4}}>{listing.bed}</span>}
        {listing.neighborhood&&<span style={{fontSize:12,background:"#1a1a1a",color:"#888",padding:"3px 10px",borderRadius:4}}>{listing.neighborhood}</span>}
      </div>
      {listing.moveInDate&&(
        <div style={{marginTop:6,fontSize:11,color:"#666"}}>Move-in: {fmtDate(listing.moveInDate)}</div>
      )}
      {(hasNotes||eventCount>0)&&(
        <div style={{display:"flex",gap:8,marginTop:8,fontSize:10,color:"#555"}}>
          {hasNotes&&<span>notes</span>}
          {eventCount>0&&<span>{eventCount} update{eventCount>1?"s":""}</span>}
        </div>
      )}
    </div>
  );
}

// ── Add Listing Modal ────────────────────────────────────────────────────────
function AddListingModal({onClose,onAdd,buildings}){
  const[form,setForm]=useState({name:"",address:"",neighborhood:"",amenities:"",url:"",price:"",bed:"",bath:"",notes:"",photoUrl:"",buildingId:"",moveInDate:""});
  const[scraping,setScraping]=useState(false);
  const[scraped,setScraped]=useState(false);
  const scrapeTimer=useRef(null);

  const set=(k,v)=>setForm(p=>({...p,[k]:v}));

  const handleUrlPaste=(e)=>{
    const url=e.target.value;
    set("url",url);
    if(!url.startsWith("http")||!url.includes("."))return;
    const hints=parseUrlHints(url);
    setForm(p=>({...p,url,name:hints.name||p.name,address:hints.address||p.address,neighborhood:hints.neighborhood||p.neighborhood,bed:hints.bed||p.bed,price:hints.price||p.price}));
    if(scrapeTimer.current)clearTimeout(scrapeTimer.current);
    scrapeTimer.current=setTimeout(async()=>{
      setScraping(true);
      const data=await scrapeUrl(url);
      setScraping(false);
      if(data){
        setScraped(true);
        setForm(p=>({...p,name:data.name||p.name,address:data.address||p.address,neighborhood:data.neighborhood||p.neighborhood,price:data.price||p.price,bed:data.bed||p.bed,photoUrl:data.photoUrl||p.photoUrl}));
        setTimeout(()=>setScraped(false),2000);
      }
    },600);
  };

  const submit=()=>{
    if(!form.name&&!form.url)return;
    onAdd({
      ...form,
      id:uid(),
      stage:"considering",
      rating:0,
      timeline:[{event:"considering",date:today(),note:"Added to board"}],
      createdAt:today(),
      updatedAt:today(),
    });
    onClose();
  };

  return(
    <Modal title="Add Listing" onClose={onClose} wide>
      <Field label="Listing URL (StreetEasy, Zillow, etc.)">
        <div style={{position:"relative"}}>
          <input value={form.url} onChange={handleUrlPaste} placeholder="Paste a link to auto-fill details..." />
          {scraping&&<span style={{position:"absolute",right:12,top:10,fontSize:11,color:"#38bdf8",animation:"pulse 1s infinite"}}>Fetching...</span>}
          {scraped&&<span style={{position:"absolute",right:12,top:10,fontSize:11,color:"#34d399"}}>✓ Filled</span>}
        </div>
      </Field>
      <Field label="Name"><input value={form.name} onChange={e=>set("name",e.target.value)} placeholder="e.g. The Windermere" /></Field>
      <Field label="Address"><input value={form.address} onChange={e=>set("address",e.target.value)} placeholder="e.g. 400 West 57th Street" /></Field>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
        <Field label="Neighborhood"><input value={form.neighborhood} onChange={e=>set("neighborhood",e.target.value)} placeholder="e.g. Hell's Kitchen" /></Field>
        <Field label="Price ($/mo)"><input value={form.price} onChange={e=>set("price",e.target.value)} placeholder="3500" /></Field>
        <Field label="Bedrooms"><input value={form.bed} onChange={e=>set("bed",e.target.value)} placeholder="Studio, 1BR..." /></Field>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <Field label="Bathrooms"><input value={form.bath} onChange={e=>set("bath",e.target.value)} placeholder="1" /></Field>
        <Field label="Move-in Date"><input type="date" value={form.moveInDate} onChange={e=>set("moveInDate",e.target.value)} /></Field>
      </div>
      <Field label="Amenities"><input value={form.amenities} onChange={e=>set("amenities",e.target.value)} placeholder="e.g. Doorman, Gym, Rooftop" /></Field>
      <Field label="Building"><select value={form.buildingId} onChange={e=>set("buildingId",e.target.value)} style={{width:"100%",padding:"10px 12px",background:"#161616",border:"1px solid #2a2a2a",color:"#fff",borderRadius:8,fontSize:13,outline:"none"}}><option value="">No building linked</option>{buildings.map(b=><option key={b.id} value={b.id}>{b.name}</option>)}</select></Field>
      <Field label="Notes"><textarea value={form.notes} onChange={e=>set("notes",e.target.value)} rows={2} placeholder="First impressions, broker contact, etc." /></Field>
      <button onClick={submit} style={{width:"100%",padding:12,background:"#fff",color:"#000",fontWeight:600,borderRadius:8,fontSize:13,marginTop:4}}>Add to Considering</button>
    </Modal>
  );
}

// ── Listing Detail Modal ─────────────────────────────────────────────────────
function DetailModal({listing,onClose,onUpdate,onDelete,username,buildings}){
  const[newComment,setNewComment]=useState("");
  const[newTimelineNote,setNewTimelineNote]=useState("");
  const[editing,setEditing]=useState(false);
  const[editingAgent,setEditingAgent]=useState(false);
  const[form,setForm]=useState({...listing});
  const[agentForm,setAgentForm]=useState(listing.agent||{name:"",phone:"",email:"",company:""});
  const[tab,setTab]=useState("details");
  const stage=STAGE_MAP[listing.stage]||STAGE_MAP.considering;
  const screenshots=getScreenshotsLocal(listing.id);

  const addComment=()=>{
    if(!newComment.trim())return;
    const comments=[...(listing.comments||[]),{id:uid(),text:newComment.trim(),author:username,date:today(),time:new Date().toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"})}];
    onUpdate({...listing,comments});
    setNewComment("");
  };

  const addTimelineEvent=(note)=>{
    if(!note.trim())return;
    const tl=[...(listing.timeline||[]),{event:listing.stage,date:today(),note:note.trim(),author:username}];
    onUpdate({...listing,timeline:tl});
    setNewTimelineNote("");
  };

  const moveToStage=(stageId)=>{
    const stageInfo=STAGE_MAP[stageId];
    const tl=[...(listing.timeline||[]),{event:stageId,date:today(),note:"Moved to "+stageInfo.label,author:username}];
    onUpdate({...listing,stage:stageId,timeline:tl,updatedAt:today()});
  };

  const saveEdit=()=>{
    onUpdate({...listing,...form,updatedAt:today()});
    setEditing(false);
  };

  const saveAgent=()=>{
    onUpdate({...listing,agent:agentForm,updatedAt:today()});
    setEditingAgent(false);
  };

  const handlePhotoUpload=(e)=>{
    const files=Array.from(e.target.files);
    let ss=[...screenshots];
    let loaded=0;
    files.forEach(file=>{
      const reader=new FileReader();
      reader.onload=(ev)=>{
        ss=[...ss,{id:uid(),data:ev.target.result,name:file.name,date:today()}];
        loaded++;
        if(loaded===files.length){
          saveScreenshotsLocal(listing.id,ss);
          onUpdate({...listing,updatedAt:today()});
        }
      };
      reader.readAsDataURL(file);
    });
  };

  const deleteScreenshot=(ssId)=>{
    const updated=screenshots.filter(s=>s.id!==ssId);
    saveScreenshotsLocal(listing.id,updated);
    onUpdate({...listing,updatedAt:today()});
  };

  const handleDrop=(e)=>{
    e.preventDefault();
    const files=Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith("image/"));
    if(!files.length)return;
    let ss=[...screenshots];
    let loaded=0;
    files.forEach(file=>{
      const reader=new FileReader();
      reader.onload=(ev)=>{
        ss=[...ss,{id:uid(),data:ev.target.result,name:file.name,date:today()}];
        loaded++;
        if(loaded===files.length){
          saveScreenshotsLocal(listing.id,ss);
          onUpdate({...listing,updatedAt:today()});
        }
      };
      reader.readAsDataURL(file);
    });
  };

  const agent=listing.agent||{};
  const comments=listing.comments||[];
  const tabs=[{id:"details",label:"Details"},{id:"notes",label:"Notes ("+comments.length+")"},{id:"photos",label:"Photos ("+screenshots.length+")"},{id:"timeline",label:"Timeline"}];

  return(
    <Modal title="" onClose={onClose} wide>
      {/* Header */}
      <div style={{marginBottom:16,marginTop:-8}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
          <span style={{background:stage.color+"22",color:stage.color,padding:"3px 10px",borderRadius:6,fontSize:11,fontWeight:600}}>{stage.label}</span>
          {listing.url&&<a href={listing.url} target="_blank" style={{fontSize:11,color:"#38bdf8",textDecoration:"none"}}>View listing ↗</a>}
        </div>
        {editing?(
          <div>
            <Field label="Name"><input value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))} /></Field>
            <Field label="Address"><input value={form.address} onChange={e=>setForm(p=>({...p,address:e.target.value}))} /></Field>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
              <Field label="Neighborhood"><input value={form.neighborhood} onChange={e=>setForm(p=>({...p,neighborhood:e.target.value}))} /></Field>
              <Field label="Price"><input value={form.price} onChange={e=>setForm(p=>({...p,price:e.target.value}))} /></Field>
              <Field label="Bed"><input value={form.bed} onChange={e=>setForm(p=>({...p,bed:e.target.value}))} /></Field>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <Field label="Bathrooms"><input value={form.bath||""} onChange={e=>setForm(p=>({...p,bath:e.target.value}))} /></Field>
              <Field label="Move-in Date"><input type="date" value={form.moveInDate||""} onChange={e=>setForm(p=>({...p,moveInDate:e.target.value}))} /></Field>
            </div>
            <Field label="Building"><select value={form.buildingId||""} onChange={e=>setForm(p=>({...p,buildingId:e.target.value}))} style={{width:"100%",padding:"10px 12px",background:"#161616",border:"1px solid #2a2a2a",color:"#fff",borderRadius:8,fontSize:13,outline:"none"}}><option value="">No building linked</option>{buildings.map(b=><option key={b.id} value={b.id}>{b.name}</option>)}</select></Field>
            <Field label="Amenities"><input value={form.amenities} onChange={e=>setForm(p=>({...p,amenities:e.target.value}))} /></Field>
            <div style={{display:"flex",gap:8}}>
              <button onClick={saveEdit} style={{padding:"6px 16px",background:"#fff",color:"#000",borderRadius:6,fontSize:12,fontWeight:500}}>Save</button>
              <button onClick={()=>setEditing(false)} style={{padding:"6px 16px",background:"#222",color:"#888",borderRadius:6,fontSize:12}}>Cancel</button>
            </div>
          </div>
        ):(
          <div>
            <h2 style={{fontSize:20,fontWeight:700,marginBottom:4}}>{listing.name||"Untitled"}</h2>
            {listing.address&&<div style={{fontSize:13,color:"#888"}}>{listing.address}</div>}
            <div style={{display:"flex",gap:10,marginTop:8,flexWrap:"wrap",alignItems:"center"}}>
              {listing.price&&<span style={{fontSize:13,color:"#34d399",fontWeight:600}}>${Number(listing.price).toLocaleString()}/mo</span>}
              {listing.bed&&<span style={{fontSize:12,color:"#818cf8"}}>{listing.bed}</span>}
              {listing.bath&&<span style={{fontSize:12,color:"#888"}}>{listing.bath} bath</span>}
              {listing.neighborhood&&<span style={{fontSize:12,color:"#888"}}>{listing.neighborhood}</span>}
              {listing.moveInDate&&<span style={{fontSize:12,color:"#666"}}>Move-in: {fmtDate(listing.moveInDate)}</span>}
              <button onClick={()=>setEditing(true)} style={{fontSize:11,color:"#555",background:"none",textDecoration:"underline"}}>edit details</button>
            </div>
          </div>
        )}
      </div>

      {/* Scraped photo banner */}
      {listing.photoUrl&&(
        <div style={{marginBottom:12,borderRadius:8,overflow:"hidden",maxHeight:160}}>
          <img src={listing.photoUrl} style={{width:"100%",objectFit:"cover"}} onError={e=>{e.target.style.display="none"}} />

      {/* Move to Stage */}
      <div style={{marginBottom:16}}>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {STAGES.map(s=>(
            <button key={s.id} onClick={()=>moveToStage(s.id)}

                padding:"5px 12px",borderRadius:6,fontSize:11,fontWeight:500,

      </div>

      {/* Tabs */}
      <div style={{display:"flex",gap:0,borderBottom:"1px solid #222",marginBottom:16}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{

                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                  <Field label="Name"><input value={agentForm.name} onChange={e=>setAgentForm(p=>({...p,name:e.target.value}))} placeholder="Agent name" /></Field>
                  <Field label="Company"><input value={agentForm.company} onChange={e=>setAgentForm(p=>({...p,company:e.target.value}))} placeholder="Brokerage" /></Field>

            <div key={c.id} style={{marginBottom:12,padding:12,background:"#0f0f0f",borderRadius:8,borderLeft:"3px solid "+(c.author===username?"#38bdf8":"#a78bfa")}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                <span style={{fontSize:12,fontWeight:600,color:c.author===username?"#38bdf8":"#a78bfa"}}>{c.author}</span>
                <span style={{fontSize:10,color:"#444"}}>{fmtDate(c.date)} {c.time||""}</span>
              </div>
              <div style={{fontSize:13,color:"#ccc",lineHeight:1.5}}>{c.text}</div>
            </div>
          ))}
        </div>
      )}

      {/* Photos Tab */}
      {tab==="photos"&&(
        <div>
          <div
            onDragOver={e=>{e.preventDefault();e.currentTarget.style.borderColor="#555";e.currentTarget.style.background="#0f0f0f"}}
            onDragLeave={e=>{e.currentTarget.style.borderColor="#333";e.currentTarget.style.background="transparent"}}
            onDrop={e=>{e.currentTarget.style.borderColor="#333";e.currentTarget.style.background="transparent";handleDrop(e)}}
            style={{border:"2px dashed #333",borderRadius:8,padding:24,textAlign:"center",cursor:"pointer",marginBottom:16,transition:"all .15s"}}
          >
            <label style={{cursor:"pointer"}}>
              <div style={{fontSize:13,color:"#666",marginBottom:4}}>Drop images here or click to upload</div>
              <div style={{fontSize:11,color:"#444"}}>Photos are saved on this device only</div>
              <input type="file" accept="image/*" multiple onChange={handlePhotoUpload} style={{display:"none"}} />
            </label>
          </div>
          {screenshots.length===0&&!listing.photoUrl&&(
            <div style={{fontSize:12,color:"#333",textAlign:"center",padding:20}}>No photos yet</div>
          )}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            {screenshots.map(ss=>(
              <div key={ss.id} style={{borderRadius:8,overflow:"hidden",border:"1px solid #222",position:"relative"}}>
                <img src={ss.data} style={{width:"100%",display:"block"}} />
                <button onClick={()=>deleteScreenshot(ss.id)} style={{position:"absolute",top:4,right:4,background:"rgba(0,0,0,.7)",color:"#ef4444",borderRadius:4,width:20,height:20,fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
                <div style={{padding:6,fontSize:10,color:"#555"}}>{fmtDate(ss.date)}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Timeline Tab */}
      {tab==="timeline"&&(
        <div>
          <div style={{display:"flex",gap:8,marginBottom:16}}>
            <input value={newTimelineNote} onChange={e=>setNewTimelineNote(e.target.value)} placeholder="Log an update..." onKeyDown={e=>{if(e.key==="Enter")addTimelineEvent(newTimelineNote)}} style={{flex:1}} />
            <button onClick={()=>addTimelineEvent(newTimelineNote)} style={{padding:"8px 16px",background:"#222",color:"#fff",borderRadius:6,fontSize:12}}>Add</button>
          </div>
          {(listing.timeline||[]).length===0&&<div style={{fontSize:12,color:"#333",textAlign:"center",padding:20}}>No activity yet</div>}
          {(listing.timeline||[]).slice().reverse().map((ev,i)=>{
            const evStage=STAGE_MAP[ev.event];
            return(
              <div key={i} style={{display:"flex",gap:10,marginBottom:12,fontSize:12}}>
                <div style={{color:"#333",minWidth:55,textAlign:"right",flexShrink:0}}>{fmtDate(ev.date)}</div>
                <div style={{width:8,height:8,borderRadius:"50%",background:evStage?evStage.color:"#444",marginTop:5,flexShrink:0}} />
                <div>
                  <span style={{color:"#aaa"}}>{ev.note}</span>
                  {ev.author&&<span style={{color:"#555",marginLeft:6}}>— {ev.author}</span>}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </Modal>
  );
}

// ── Workspace Modal ──────────────────────────────────────────────────────────
function WorkspaceModal({onClose,user,userDoc,onRefreshUser}){
  const[inviteEmail,setInviteEmail]=useState("");
  const[creating,setCreating]=useState(false);
  const[inviting,setInviting]=useState(false);
  const[leaving,setLeaving]=useState(false);
  const[msg,setMsg]=useState("");
  const[wsData,setWsData]=useState(null);
  const[pendingInvite,setPendingInvite]=useState(null);

  useEffect(()=>{
    if(userDoc&&userDoc.workspaceId){
      const unsub=db.collection("workspaces").doc(userDoc.workspaceId).onSnapshot(snap=>{
        if(snap.exists)setWsData({id:snap.id,...snap.data()});
      });
      return ()=>unsub();
    }
    // Check for pending invites
    db.collection("workspaces").where("pendingEmail","==",user.email).get().then(snap=>{
      if(!snap.empty){
        const doc=snap.docs[0];
        setPendingInvite({id:doc.id,...doc.data()});
      }
    }).catch(()=>{});
  },[userDoc]);

  const createWorkspace=async()=>{
    setCreating(true);setMsg("");
    try{
      const wsId=uid()+uid();
      await db.collection("workspaces").doc(wsId).set({
        members:[user.uid],
        memberEmails:[user.email],
        memberNames:[user.displayName||user.email],
        createdBy:user.uid,
        createdAt:new Date().toISOString(),
        pendingEmail:"",
      });
      await db.collection("users").doc(user.uid).update({workspaceId:wsId});
      onRefreshUser();
      setMsg("Workspace created!");
    }catch(e){setMsg("Error: "+e.message)}
    setCreating(false);
  };

  const sendInvite=async()=>{
    if(!inviteEmail||!inviteEmail.includes("@"))return;
    setInviting(true);setMsg("");
    try{
      const cleanEmail=inviteEmail.toLowerCase().trim();
      await db.collection("workspaces").doc(userDoc.workspaceId).update({pendingEmail:cleanEmail});
      // Send sign-in link email via Firebase Auth
      const actionCodeSettings={url:"https://borough-dfc1d.web.app/?invite="+userDoc.workspaceId,handleCodeInApp:true};
      await auth.sendSignInLinkToEmail(cleanEmail,actionCodeSettings);
      setMsg("Invite email sent to "+cleanEmail+"! They'll get a link to join Borough.");
      setInviteEmail("");
    }catch(e){
      if(e.code==="auth/unauthorized-continue-uri")setMsg("Error: Enable Email Link sign-in in Firebase Console → Authentication → Sign-in method");
      else setMsg("Error: "+e.message);
    }
    setInviting(false);
  };

  const acceptInvite=async()=>{
    if(!pendingInvite)return;
    setCreating(true);setMsg("");
    try{
      const wsRef=db.collection("workspaces").doc(pendingInvite.id);
      await wsRef.update({
        members:firebase.firestore.FieldValue.arrayUnion(user.uid),
        memberEmails:firebase.firestore.FieldValue.arrayUnion(user.email),
        memberNames:firebase.firestore.FieldValue.arrayUnion(user.displayName||user.email),
        pendingEmail:"",
      });
      await db.collection("users").doc(user.uid).update({workspaceId:pendingInvite.id});
      onRefreshUser();
      setMsg("Joined workspace!");
      setPendingInvite(null);
    }catch(e){setMsg("Error: "+e.message)}
    setCreating(false);
  };

  const leaveWorkspace=async()=>{
    if(!confirm("Leave this workspace? Your shared listings will stay with the workspace."))return;
    setLeaving(true);
    try{
      const wsRef=db.collection("workspaces").doc(userDoc.workspaceId);
      await wsRef.update({
        members:firebase.firestore.FieldValue.arrayRemove(user.uid),
        memberEmails:firebase.firestore.FieldValue.arrayRemove(user.email),
        memberNames:firebase.firestore.FieldValue.arrayRemove(user.displayName||user.email),
      });
      await db.collection("users").doc(user.uid).update({workspaceId:""});
      onRefreshUser();
      onClose();
    }catch(e){setMsg("Error: "+e.message)}
    setLeaving(false);
  };

  return(
    <Modal title="Workspace" onClose={onClose}>
      {/* Pending invite */}
      {!userDoc?.workspaceId&&pendingInvite&&(
        <div style={{background:"rgba(56,189,248,.05)",border:"1px solid rgba(56,189,248,.15)",borderRadius:8,padding:16,marginBottom:16}}>
          <div style={{fontSize:13,fontWeight:600,color:"#38bdf8",marginBottom:4}}>You've been invited!</div>
          <div style={{fontSize:12,color:"#888",marginBottom:12}}>
            {pendingInvite.memberNames?.[0]||"Someone"} invited you to share a workspace. You'll both see the same listings.
          </div>
          <button onClick={acceptInvite} disabled={creating} style={{padding:"8px 16px",background:"#38bdf8",color:"#000",borderRadius:6,fontSize:12,fontWeight:600}}>
            {creating?"Joining...":"Accept Invite"}
          </button>
        </div>
      )}

      {/* No workspace yet */}
      {!userDoc?.workspaceId&&!pendingInvite&&(
        <div>
          <div style={{background:"#0f0f0f",borderRadius:8,padding:16,marginBottom:16}}>
            <div style={{fontSize:13,fontWeight:500,marginBottom:8}}>What's a workspace?</div>
            <div style={{fontSize:12,color:"#888",lineHeight:1.6}}>
              A workspace lets you and a partner (roommate, significant other) share the same listings. Both of you can add, edit, and move listings in real-time.
            </div>
          </div>
          <button onClick={createWorkspace} disabled={creating} style={{width:"100%",padding:12,background:"#fff",color:"#000",fontWeight:600,borderRadius:8,fontSize:13}}>
            {creating?"Creating...":"Create a Workspace"}
          </button>
        </div>
      )}

      {/* Has workspace */}
      {userDoc?.workspaceId&&wsData&&(
        <div>
          <div style={{background:"rgba(52,211,153,.05)",border:"1px solid rgba(52,211,153,.15)",borderRadius:8,padding:16,marginBottom:16}}>
            <div style={{fontSize:13,color:"#34d399",fontWeight:500,marginBottom:8}}>● Active Workspace</div>
            <div style={{fontSize:12,color:"#888"}}>
              Members: {(wsData.memberNames||[]).join(", ")||"Just you"}
            </div>
          </div>

          {/* Invite partner */}
          {(wsData.members||[]).length<2&&!wsData.pendingEmail&&(
            <div style={{marginBottom:16}}>
              <Field label="Invite a Partner">
                <div style={{display:"flex",gap:8}}>
                  <input value={inviteEmail} onChange={e=>setInviteEmail(e.target.value)} placeholder="partner@email.com" onKeyDown={e=>{if(e.key==="Enter")sendInvite()}} />
                  <button onClick={sendInvite} disabled={inviting} style={{padding:"8px 16px",background:"#222",color:"#fff",borderRadius:6,fontSize:12,whiteSpace:"nowrap"}}>{inviting?"Sending...":"Invite"}</button>
                </div>
              </Field>
            </div>
          )}

          {wsData.pendingEmail&&(
            <div style={{background:"#1a1a1a",borderRadius:8,padding:12,marginBottom:16,fontSize:12,color:"#888"}}>
              Pending invite to <strong style={{color:"#fff"}}>{wsData.pendingEmail}</strong>
            </div>
          )}

          <button onClick={leaveWorkspace} disabled={leaving} style={{width:"100%",padding:10,background:"#1a1111",color:"#ef4444",borderRadius:6,fontSize:12,border:"1px solid #2a1515"}}>
            {leaving?"Leaving...":"Leave Workspace"}
          </button>
        </div>
      )}

      {msg&&<div style={{marginTop:12,fontSize:12,color:"#34d399",textAlign:"center"}}>{msg}</div>}
    </Modal>
  );
}

// ── Add Building Modal ────────────────────────────────────────────────────────
function AddBuildingModal({onClose,onAdd}){
  const[form,setForm]=useState({
    name:"",address:"",neighborhood:"",managementCompany:"",yearBuilt:"",numUnits:"",
    photoUrl:"",url:"",amenities:{},leasingDetails:{appReqs:"",brokerFee:false,brokerFeeAmount:"",minPrice:"",maxPrice:"",leaseTerms:"",notes:""}
  });
  const[scraping,setScraping]=useState(false);
  const[scraped,setScraped]=useState(false);
  const scrapeTimer=useRef(null);

  const set=(k,v)=>setForm(p=>({...p,[k]:v}));
  const setAmenity=(k,v)=>setForm(p=>({...p,amenities:{...p.amenities,[k]:v}}));
  const setLeasingDetail=(k,v)=>setForm(p=>({...p,leasingDetails:{...p.leasingDetails,[k]:v}}));

  const handleUrlPaste=(e)=>{
    const url=e.target.value;
    set("url",url);
    if(!url.startsWith("http")||!url.includes("."))return;
    if(scrapeTimer.current)clearTimeout(scrapeTimer.current);
    scrapeTimer.current=setTimeout(async()=>{
      setScraping(true);
      const data=await scrapeBuildingUrl(url);
      setScraping(false);
      if(data){
        setScraped(true);
        setForm(p=>({
          ...p,url,name:data.name||p.name,address:data.address||p.address,neighborhood:data.neighborhood||p.neighborhood,
          photoUrl:data.photoUrl||p.photoUrl,amenities:{...p.amenities,...data.amenities},
          leasingDetails:{...p.leasingDetails,minPrice:data.leasingDetails.minPrice||p.leasingDetails.minPrice,maxPrice:data.leasingDetails.maxPrice||p.leasingDetails.maxPrice},
        }));
        setTimeout(()=>setScraped(false),2500);
      }
    },600);
  };

  const submit=()=>{
    if(!form.name&&!form.url)return;
    onAdd({...form,id:uid(),rating:0,comments:[],createdAt:today()});
    onClose();
  };

  return(
    <Modal title="Add Building" onClose={onClose} wide>
      <Field label="Building Website URL">
        <div style={{position:"relative"}}>
          <input value={form.url} onChange={handleUrlPaste} placeholder="Paste a building website to auto-fill details..." />
          {scraping&&<span style={{position:"absolute",right:12,top:10,fontSize:11,color:"#38bdf8",animation:"pulse 1s infinite"}}>Fetching...</span>}
          {scraped&&<span style={{position:"absolute",right:12,top:10,fontSize:11,color:"#34d399"}}>Auto-filled</span>}
        </div>
      </Field>
      <div style={{fontSize:13,fontWeight:600,color:"#fff",marginBottom:12,marginTop:4}}>Location & Basics</div>
      <Field label="Name"><input value={form.name} onChange={e=>set("name",e.target.value)} placeholder="e.g. The Windermere" /></Field>
      <Field label="Address"><input value={form.address} onChange={e=>set("address",e.target.value)} placeholder="e.g. 400 West 57th Street" /></Field>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <Field label="Neighborhood"><input value={form.neighborhood} onChange={e=>set("neighborhood",e.target.value)} placeholder="e.g. Hell's Kitchen" /></Field>
        <Field label="Management Company"><input value={form.managementCompany} onChange={e=>set("managementCompany",e.target.value)} placeholder="e.g. Silverstein Properties" /></Field>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
        <Field label="Year Built"><input value={form.yearBuilt} onChange={e=>set("yearBuilt",e.target.value)} placeholder="1990" /></Field>
        <Field label="Number of Units"><input value={form.numUnits} onChange={e=>set("numUnits",e.target.value)} placeholder="500" /></Field>
        <Field label="Photo URL"><input value={form.photoUrl} onChange={e=>set("photoUrl",e.target.value)} placeholder="https://..." /></Field>
      </div>

      <div style={{fontSize:13,fontWeight:600,color:"#fff",marginBottom:12,marginTop:16}}>Amenities</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
        {["Doorman","Gym","Laundry","Rooftop","Pet Policy","Parking"].map(a=>(
          <label key={a} style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer"}}>
            <input type="checkbox" checked={form.amenities[a]||false} onChange={e=>setAmenity(a,e.target.checked)} style={{width:18,height:18,cursor:"pointer"}} />
            <span style={{fontSize:13}}>{a}</span>
          </label>
        ))}
      </div>
      <Field label="Other Amenities"><input value={form.amenities.other||""} onChange={e=>setAmenity("other",e.target.value)} placeholder="Additional amenities..." /></Field>

      <div style={{fontSize:13,fontWeight:600,color:"#fff",marginBottom:12,marginTop:16}}>Leasing Details</div>
      <Field label="Application Requirements"><textarea value={form.leasingDetails.appReqs} onChange={e=>setLeasingDetail("appReqs",e.target.value)} rows={2} placeholder="Credit score, income verification, etc." /></Field>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
        <div>
          <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer"}}>
            <input type="checkbox" checked={form.leasingDetails.brokerFee||false} onChange={e=>setLeasingDetail("brokerFee",e.target.checked)} style={{width:18,height:18,cursor:"pointer"}} />
            <span style={{fontSize:13}}>Broker Fee Required</span>
          </label>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <Field label="Min Price ($/mo)"><input value={form.leasingDetails.minPrice} onChange={e=>setLeasingDetail("minPrice",e.target.value)} placeholder="3000" /></Field>
        <Field label="Max Price ($/mo)"><input value={form.leasingDetails.maxPrice} onChange={e=>setLeasingDetail("maxPrice",e.target.value)} placeholder="5000" /></Field>
      </div>
      <Field label="Typical Lease Terms"><input value={form.leasingDetails.leaseTerms} onChange={e=>setLeasingDetail("leaseTerms",e.target.value)} placeholder="e.g. 1-2 years" /></Field>
      <Field label="Notes"><textarea value={form.leasingDetails.notes} onChange={e=>setLeasingDetail("notes",e.target.value)} rows={2} placeholder="Additional info..." /></Field>

      <button onClick={submit} style={{width:"100%",padding:12,background:"#fff",color:"#000",fontWeight:600,borderRadius:8,fontSize:13,marginTop:4}}>Add Building</button>
    </Modal>
  );
}

// ── Building Detail Modal ─────────────────────────────────────────────────────
function BuildingDetailModal({building,onClose,onUpdate,onDelete,listings,username}){
  const[newComment,setNewComment]=useState("");
  const[editing,setEditing]=useState(false);
  const[form,setForm]=useState({...building});
  const[tab,setTab]=useState("details");

  const addComment=()=>{
    if(!newComment.trim())return;
    const comments=[...(building.comments||[]),{id:uid(),text:newComment.trim(),author:username,date:today(),time:new Date().toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"})}];
    onUpdate({...building,comments});
    setNewComment("");
  };

  const saveEdit=()=>{onUpdate({...building,...form});setEditing(false)};

  const linkedListings=listings.filter(l=>l.buildingId===building.id);
  const tabs=[{id:"details",label:"Details"},{id:"listings",label:"Listings ("+linkedListings.length+")"},{id:"notes",label:"Notes ("+((building.comments||[]).length)+")"} ];

  return(
    <Modal title="" onClose={onClose} wide>
      <div style={{marginBottom:16,marginTop:-8}}>
        {editing?(
          <div>
            <Field label="Name"><input value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))} /></Field>
            <Field label="Address"><input value={form.address} onChange={e=>setForm(p=>({...p,address:e.target.value}))} /></Field>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <Field label="Neighborhood"><input value={form.neighborhood} onChange={e=>setForm(p=>({...p,neighborhood:e.target.value}))} /></Field>
              <Field label="Management Company"><input value={form.managementCompany} onChange={e=>setForm(p=>({...p,managementCompany:e.target.value}))} /></Field>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
              <Field label="Year Built"><input value={form.yearBuilt} onChange={e=>setForm(p=>({...p,yearBuilt:e.target.value}))} /></Field>
              <Field label="Number of Units"><input value={form.numUnits} onChange={e=>setForm(p=>({...p,numUnits:e.target.value}))} /></Field>
              <Field label="Photo URL"><input value={form.photoUrl} onChange={e=>setForm(p=>({...p,photoUrl:e.target.value}))} /></Field>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={saveEdit} style={{padding:"6px 16px",background:"#fff",color:"#000",borderRadius:6,fontSize:12,fontWeight:500}}>Save</button>
              <button onClick={()=>setEditing(false)} style={{padding:"6px 16px",background:"#222",color:"#888",borderRadius:6,fontSize:12}}>Cancel</button>
            </div>
          </div>
        ):(
          <div>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
              {building.url&&<a href={building.url} target="_blank" style={{fontSize:11,color:"#38bdf8",textDecoration:"none"}}>Visit website ↗</a>}
            </div>
            <h2 style={{fontSize:20,fontWeight:700,marginBottom:4}}>{building.name||"Untitled"}</h2>
            {building.address&&<div style={{fontSize:13,color:"#888"}}>{building.address}</div>}
            <div style={{display:"flex",gap:10,marginTop:8,flexWrap:"wrap",alignItems:"center"}}>
              {building.neighborhood&&<span style={{fontSize:12,color:"#888"}}>{building.neighborhood}</span>}
              {building.managementCompany&&<span style={{fontSize:12,color:"#888"}}>{building.managementCompany}</span>}
              <button onClick={()=>setEditing(true)} style={{fontSize:11,color:"#555",background:"none",textDecoration:"underline"}}>edit</button>
            </div>
          </div>
        )}
      </div>

      {building.photoUrl&&(
        <div style={{marginBottom:12,borderRadius:8,overflow:"hidden",maxHeight:160}}>
          <img src={building.photoUrl} style={{width:"100%",objectFit:"cover"}} onError={e=>{e.target.style.display="none"}} />
        </div>
      )}

      <div style={{display:"flex",gap:0,borderBottom:"1px solid #222",marginBottom:16}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{
            padding:"8px 16px",fontSize:12,fontWeight:tab===t.id?600:400,
            color:tab===t.id?"#fff":"#555",background:"none",
            borderBottom:tab===t.id?"2px solid #fff":"2px solid transparent",
          }}>{t.label}</button>
        ))}
      </div>

      {tab==="details"&&(
        <div>
          <div style={{marginBottom:20}}>
            <div style={{fontSize:11,color:"#666",fontWeight:500,textTransform:"uppercase",letterSpacing:".5px",marginBottom:8}}>Rating</div>
            <StarRating rating={building.rating||0} onRate={(r)=>onUpdate({...building,rating:r})} />
          </div>
          {building.yearBuilt&&<div style={{marginBottom:16}}><div style={{fontSize:11,color:"#666",fontWeight:500,textTransform:"uppercase",letterSpacing:".5px",marginBottom:6}}>Year Built</div><div style={{fontSize:13,color:"#ccc"}}>{building.yearBuilt}</div></div>}
          {building.numUnits&&<div style={{marginBottom:16}}><div style={{fontSize:11,color:"#666",fontWeight:500,textTransform:"uppercase",letterSpacing:".5px",marginBottom:6}}>Number of Units</div><div style={{fontSize:13,color:"#ccc"}}>{building.numUnits}</div></div>}
          {Object.keys(building.amenities||{}).some(k=>building.amenities[k])&&(
            <div style={{marginBottom:16}}>
              <div style={{fontSize:11,color:"#666",fontWeight:500,textTransform:"uppercase",letterSpacing:".5px",marginBottom:6}}>Amenities</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                {Object.entries(building.amenities||{}).map(([k,v])=>v&&(
                  <span key={k} style={{fontSize:12,background:"#1a2a1a",color:"#34d399",padding:"3px 10px",borderRadius:4}}>{k}</span>
                ))}
              </div>
            </div>
          )}
          {building.leasingDetails&&(building.leasingDetails.minPrice||building.leasingDetails.maxPrice)&&(
            <div style={{marginBottom:16}}>
              <div style={{fontSize:11,color:"#666",fontWeight:500,textTransform:"uppercase",letterSpacing:".5px",marginBottom:6}}>Typical Price Range</div>
              <div style={{fontSize:13,color:"#ccc"}}>
                {building.leasingDetails.minPrice&&<span>${Number(building.leasingDetails.minPrice).toLocaleString()}</span>}
                {building.leasingDetails.minPrice&&building.leasingDetails.maxPrice&&<span> – </span>}
                {building.leasingDetails.maxPrice&&<span>${Number(building.leasingDetails.maxPrice).toLocaleString()}</span>}
                {(building.leasingDetails.minPrice||building.leasingDetails.maxPrice)&&<span>/mo</span>}
              </div>
            </div>
          )}
          <button onClick={()=>{if(confirm("Delete this building permanently?"))onDelete(building.id)}} style={{width:"100%",padding:10,background:"#1a1111",color:"#ef4444",borderRadius:6,fontSize:12,border:"1px solid #2a1515",marginTop:8}}>Delete building</button>
        </div>
      )}

      {tab==="listings"&&(
        <div>
          {linkedListings.length===0?(
            <div style={{fontSize:12,color:"#333",textAlign:"center",padding:20}}>No listings linked to this building</div>
          ):(
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(250px,1fr))",gap:16}}>
              {linkedListings.map(l=>(<ListingCard key={l.id} listing={l} onClick={()=>{}} compareSelected={false} onCompareToggle={()=>{}} />))}
            </div>
          )}
        </div>
      )}

      {tab==="notes"&&(
        <div>
          <div style={{display:"flex",gap:8,marginBottom:16}}>
            <input value={newComment} onChange={e=>setNewComment(e.target.value)} placeholder={"Add a note..."} onKeyDown={e=>{if(e.key==="Enter")addComment()}} style={{flex:1}} />
            <button onClick={addComment} style={{padding:"8px 16px",background:"#222",color:"#fff",borderRadius:6,fontSize:12,whiteSpace:"nowrap"}}>Post</button>
          </div>
          {(building.comments||[]).length===0&&<div style={{fontSize:12,color:"#333",textAlign:"center",padding:20}}>No notes yet</div>}
          {(building.comments||[]).slice().reverse().map(c=>(
            <div key={c.id} style={{marginBottom:12,padding:12,background:"#0f0f0f",borderRadius:8,borderLeft:"3px solid "+(c.author===username?"#38bdf8":"#a78bfa")}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                <span style={{fontSize:12,fontWeight:600,color:c.author===username?"#38bdf8":"#a78bfa"}}>{c.author}</span>
                <span style={{fontSize:10,color:"#444"}}>{fmtDate(c.date)} {c.time||""}</span>
              </div>
              <div style={{fontSize:13,color:"#ccc",lineHeight:1.5}}>{c.text}</div>
            </div>
          ))}
        </div>
      )}
    </Modal>
  );
}

// ── App ──────────────────────────────────────────────────────────────────────
function App(){
  const[authUser,setAuthUser]=useState(undefined); // undefined=loading, null=logged out, object=logged in
  const[userDoc,setUserDoc]=useState(null);
  const[listings,setListings]=useState([]);
  const[buildings,setBuildings]=useState([]);
  const[modal,setModal]=useState(null);
  const[selected,setSelected]=useState(null);
  const[selectedBuilding,setSelectedBuilding]=useState(null);
  const[view,setView]=useState("pipeline");
  const[sidebarCollapsed,setSidebarCollapsed]=useState(true);
  const[compareIds,setCompareIds]=useState([]);
  const[filteredStage,setFilteredStage]=useState(null);
  const[loading,setLoading]=useState(true);
  const[showGettingStarted,setShowGettingStarted]=useState(()=>!localStorage.getItem("borough-onboarded"));
  const userDocUnsub=useRef(null);
  const listingsUnsub=useRef(null);
  const buildingsUnsub=useRef(null);

  // Handle email link sign-in (when invited user clicks the link in their email)
  useEffect(()=>{
    if(auth.isSignInWithEmailLink(window.location.href)){
      let email=window.localStorage.getItem("borough-invite-email");
      if(!email){email=window.prompt("Please enter your email to confirm sign-in:")}
      if(email){
        auth.signInWithEmailLink(email,window.location.href).then(()=>{
          window.localStorage.removeItem("borough-invite-email");
          // Clean the URL
          window.history.replaceState(null,"",window.location.pathname);
        }).catch(e=>console.error("Email link sign-in error:",e));
      }
    }
  },[]);

  // Auth state listener
  useEffect(()=>{
    const unsub=auth.onAuthStateChanged(user=>{
      setAuthUser(user);
      if(!user){
        setUserDoc(null);setListings([]);setBuildings([]);setLoading(false);
      }
    });
    return ()=>unsub();
  },[]);

  // User doc + data subscriptions
  useEffect(()=>{
    if(!authUser||!authUser.uid)return;
    // For email/password users, check verification
    if(!authUser.emailVerified&&authUser.providerData[0]?.providerId==="password"){
      setLoading(false);
      return;
    }

    // Ensure user doc exists
    const userRef=db.collection("users").doc(authUser.uid);
    userRef.get().then(snap=>{
      if(!snap.exists){
        const newUser={
          email:authUser.email||"",
          displayName:authUser.displayName||"",
          createdAt:new Date().toISOString(),
          plan:"free",
          workspaceId:"",
        };
        userRef.set(newUser);
      }
    });

    // Subscribe to user doc
    if(userDocUnsub.current)userDocUnsub.current();
    userDocUnsub.current=userRef.onSnapshot(snap=>{
      if(snap.exists){
        const ud=snap.data();
        setUserDoc(ud);
        // Now subscribe to listings + buildings based on workspace or personal
        subscribeToData(authUser.uid,ud);
      }
      setLoading(false);
    });

    return ()=>{
      if(userDocUnsub.current)userDocUnsub.current();
      if(listingsUnsub.current)listingsUnsub.current();
      if(buildingsUnsub.current)buildingsUnsub.current();
    };
  },[authUser]);

  const subscribeToData=(userId,ud)=>{
    if(listingsUnsub.current)listingsUnsub.current();
    if(buildingsUnsub.current)buildingsUnsub.current();

    const lRef=getListingsRef(userId,ud);
    const bRef=getBuildingsRef(userId,ud);

    listingsUnsub.current=lRef.orderBy("createdAt","desc").onSnapshot(snap=>{
      setListings(snap.docs.map(d=>({id:d.id,...d.data()})));
    },err=>{console.error("Listings listen error:",err);setListings([])});

    buildingsUnsub.current=bRef.onSnapshot(snap=>{
      setBuildings(snap.docs.map(d=>({id:d.id,...d.data()})));
    },err=>{console.error("Buildings listen error:",err);setBuildings([])});
  };

  const refreshUser=()=>{
    if(!authUser)return;
    // Force re-subscribe by re-reading user doc
    db.collection("users").doc(authUser.uid).get().then(snap=>{
      if(snap.exists){
        setUserDoc(snap.data());
        subscribeToData(authUser.uid,snap.data());
      }
    });
  };

  const username=authUser?.displayName||authUser?.email?.split("@")[0]||"User";

  // ── Data operations ──────────────────────────────────────────────────────
  const addListing=async(listing)=>{
    const ref=getListingsRef(authUser.uid,userDoc);
    await ref.doc(listing.id).set(listing);
  };

  const updateListing=async(updated)=>{
    const ref=getListingsRef(authUser.uid,userDoc);
    await ref.doc(updated.id).set(updated,{merge:true});
    setSelected(prev=>prev&&prev.id===updated.id?updated:prev);
  };

  const deleteListing=async(id)=>{
    const ref=getListingsRef(authUser.uid,userDoc);
    await ref.doc(id).delete();
    deleteScreenshotsLocal(id);
    setSelected(null);
  };

  const addBuilding=async(building)=>{
    const ref=getBuildingsRef(authUser.uid,userDoc);
    await ref.doc(building.id).set(building);
  };

  const updateBuilding=async(updated)=>{
    const ref=getBuildingsRef(authUser.uid,userDoc);
    await ref.doc(updated.id).set(updated,{merge:true});
    setSelectedBuilding(prev=>prev&&prev.id===updated.id?updated:prev);
  };

  const deleteBuilding=async(id)=>{
    const ref=getBuildingsRef(authUser.uid,userDoc);
    await ref.doc(id).delete();
    // Unlink listings from this building
    const lRef=getListingsRef(authUser.uid,userDoc);
    const linked=listings.filter(l=>l.buildingId===id);
    for(const l of linked){
      await lRef.doc(l.id).update({buildingId:""});
    }
    setSelectedBuilding(null);
  };

  const handleDrop=(listingId,newStageId)=>{
    const listing=listings.find(l=>l.id===listingId);
    if(!listing||listing.stage===newStageId)return;
    const stageInfo=STAGE_MAP[newStageId];
    const tl=[...(listing.timeline||[]),{event:newStageId,date:today(),note:"Moved to "+stageInfo.label}];
    updateListing({...listing,stage:newStageId,timeline:tl,updatedAt:today()});
  };

  const toggleCompare=(id)=>{
    setCompareIds(prev=>{
      if(prev.includes(id))return prev.filter(x=>x!==id);
      if(prev.length>=3)return prev;
      return[...prev,id];
    });
  };

  const dismissGettingStarted=()=>{localStorage.setItem("borough-onboarded","true");setShowGettingStarted(false)};

  // ── Loading ──────────────────────────────────────────────────────────────
  if(authUser===undefined||loading){
    return(
      <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#0a0a0a"}}>
        <div style={{textAlign:"center"}}>
          <h1 style={{fontSize:28,fontWeight:700,marginBottom:8,letterSpacing:"-0.5px"}}>Borough</h1>
          <div style={{fontSize:13,color:"#555",animation:"pulse 1s infinite"}}>Loading...</div>
        </div>
      </div>
    );
  }

  // ── Auth gate ────────────────────────────────────────────────────────────
  if(!authUser) return <AuthScreen />;

  // ── Email verification gate ──────────────────────────────────────────────
  if(!authUser.emailVerified&&authUser.providerData[0]?.providerId==="password"){
    return <VerifyEmailScreen user={authUser} />;
  }

  // ── Main App ─────────────────────────────────────────────────────────────
  const compareListings=listings.filter(l=>compareIds.includes(l.id));

  return(
    <div style={{height:"100vh",display:"flex",flexDirection:"column"}}>
      {/* Top Bar */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 20px",borderBottom:"1px solid #1a1a1a",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <h1 style={{fontSize:18,fontWeight:700,letterSpacing:"-0.5px"}}>Borough</h1>
          {userDoc?.workspaceId&&<span style={{fontSize:10,color:"#a78bfa",fontWeight:500,background:"rgba(167,139,250,.1)",padding:"2px 8px",borderRadius:4}}>Workspace</span>}
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {/* Compare button */}
          {compareIds.length>=2&&(
            <button onClick={()=>setModal("compare")} style={{padding:"7px 14px",background:"#38bdf8",color:"#000",borderRadius:6,fontSize:12,fontWeight:600}}>
              Compare ({compareIds.length})
            </button>
          )}
          {compareIds.length>0&&(
            <button onClick={()=>setCompareIds([])} style={{padding:"7px 14px",background:"#161616",color:"#888",borderRadius:6,fontSize:12,border:"1px solid #222"}}>
              Clear
            </button>
          )}
          <span style={{fontSize:11,color:"#555"}}>{username}</span>
          <button onClick={()=>setModal("workspace")} style={{padding:"7px 14px",background:"#161616",color:"#888",borderRadius:6,fontSize:12,border:"1px solid #222"}}>
            {userDoc?.workspaceId?"Workspace":"Share"}
          </button>
          {view==="pipeline"&&<button onClick={()=>setModal("add")} style={{padding:"7px 14px",background:"#fff",color:"#000",borderRadius:6,fontSize:12,fontWeight:600}}>+ Add Listing</button>}
          {view==="buildings"&&<button onClick={()=>setModal("addBuilding")} style={{padding:"7px 14px",background:"#fff",color:"#000",borderRadius:6,fontSize:12,fontWeight:600}}>+ Add Building</button>}
          <button onClick={()=>auth.signOut()} style={{padding:"7px 14px",background:"#161616",color:"#ef4444",borderRadius:6,fontSize:12,border:"1px solid #2a1515"}}>Sign Out</button>
        </div>
      </div>

      {/* Main Content */}
      <div style={{display:"flex",flex:1,overflow:"hidden"}}>
        <Sidebar view={view} onViewChange={setView} collapsed={sidebarCollapsed} onToggleCollapse={()=>setSidebarCollapsed(!sidebarCollapsed)} />

        {/* Pipeline View */}
        {view==="pipeline"&&(
          <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
            {showGettingStarted&&<GettingStartedBanner onDismiss={dismissGettingStarted} />}
            <div style={{display:"flex",gap:12,padding:"16px 20px",flex:1,overflowX:"auto"}}>
              {STAGES.map(stage=>(
                <KanbanColumn
                  key={stage.id}
                  stage={stage}
                  listings={listings.filter(l=>(l.stage||"considering")===stage.id)}
                  onCardClick={(l)=>setSelected(l)}
                  onDrop={handleDrop}
                  onDragStart={()=>{}}
                  onHeaderClick={()=>setFilteredStage(stage)}
                  compareIds={compareIds}
                  onCompareToggle={toggleCompare}
                />
              ))}
            </div>
          </div>
        )}

        {/* Buildings View */}
        {view==="buildings"&&(
          <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
            <div style={{flex:1,overflowY:"auto",padding:"20px"}}>
              {buildings.length===0?(
                <div style={{textAlign:"center",color:"#333",padding:40,fontSize:14}}>No buildings yet. Click <strong>+ Add Building</strong> to get started.</div>
              ):(
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:16}}>
                  {buildings.map(b=>(
                    <BuildingCard key={b.id} building={b} listings={listings} onClick={()=>setSelectedBuilding(b)} />
                  ))}
                </div>
              )}
            </div>
          </div>
        )}
      </div>

      {/* Modals */}
      {modal==="add"&&<AddListingModal onClose={()=>setModal(null)} onAdd={addListing} buildings={buildings} />}
      {modal==="addBuilding"&&<AddBuildingModal onClose={()=>setModal(null)} onAdd={addBuilding} />}
      {modal==="workspace"&&<WorkspaceModal onClose={()=>setModal(null)} user={authUser} userDoc={userDoc} onRefreshUser={refreshUser} />}
      {modal==="compare"&&compareListings.length>=2&&<CompareModal listings={compareListings} onClose={()=>setModal(null)} />}
      {selected&&<DetailModal listing={listings.find(l=>l.id===selected.id)||selected} onClose={()=>setSelected(null)} onUpdate={updateListing} onDelete={deleteListing} username={username} buildings={buildings} />}
      {selectedBuilding&&<BuildingDetailModal building={buildings.find(b=>b.id===selectedBuilding.id)||selectedBuilding} onClose={()=>setSelectedBuilding(null)} onUpdate={updateBuilding} onDelete={deleteBuilding} listings={listings} username={username} />}
      {filteredStage&&<FilteredStageModal stage={filteredStage} listings={listings.filter(l=>(l.stage||"considering")===filteredStage.id)} onClose={()=>setFilteredStage(null)} onCardClick={(l)=>setSelected(l)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
