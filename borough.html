// ── Data ─────────────────────────────────────────────────────────────────────
const blank=()=>({listings:[],firebaseConfig:FIREBASE_CONFIG,boardId:DEFAULT_BOARD_ID});

function loadLocal(){
  try{
    const d=localStorage.getItem(STORAGE_KEY);
    if(!d)return blank();
    const parsed=JSON.parse(d);
    if(!parsed.firebaseConfig)parsed.firebaseConfig=FIREBASE_CONFIG;
    if(!parsed.boardId)parsed.boardId=DEFAULT_BOARD_ID;
    if(!parsed.listings)parsed.listings=[];
    return parsed;
  }catch{return blank()}
}
function saveLocal(d){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(d))}catch{}}

// ── URL Scraper ──────────────────────────────────────────────────────────────
function parseUrlHints(url){
  const result={name:"",address:"",neighborhood:"",bed:"",price:""};
  try{
    const u=new URL(url);
    const host=u.hostname.replace("www.","");
    const path=u.pathname;
    if(host.includes("streeteasy.com")){
      const bm=path.match(/\/building\/([^\/]+)/);
      if(bm) result.name=bm[1].split("-").map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(" ");
      const rm=path.match(/\/rental\/(\d+)/);
      if(rm) result.name=result.name||"StreetEasy #"+rm[1];
    } else if(host.includes("zillow.com")){
      const am=path.match(/\/homedetails\/([^\/]+)\//);
      if(am){const p=am[1].replace(/_/g,"-").split("-");result.address=p.slice(0,-1).join(" ");result.name=p.slice(0,3).join(" ")}
      const bm=path.match(/\/b\/([^\/]+)/);
      if(bm) result.name=bm[1].split("-").map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(" ");
    } else if(host.includes("apartments.com")){
      const nm=path.match(/\/([^\/]+)\/\d+/);
      if(nm) result.name=nm[1].split("-").map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(" ");
    } else {
      const seg=path.split("/").filter(Boolean);
      if(seg.length>0) result.name=seg[seg.length-1].split("-").map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(" ");
    }
  }catch{}
  return result;
}

const CORS_PROXIES=[
  url=>"https://api.allorigins.win/raw?url="+encodeURIComponent(url),
  url=>"https://corsproxy.io/?"+encodeURIComponent(url),
  url=>"https://api.codetabs.com/v1/proxy?quest="+encodeURIComponent(url),
];

async function scrapeUrl(url){
  for(const proxy of CORS_PROXIES){
    try{
      const res=await fetch(proxy(url),{signal:AbortSignal.timeout(6000)});
      if(!res.ok)continue;
      const html=await res.text();
      if(html.length<200)continue;
      const doc=new DOMParser().parseFromString(html,"text/html");
      const meta=(n)=>{const el=doc.querySelector('meta[property="'+n+'"],meta[name="'+n+'"]');return el?el.getAttribute("content")||"":""};
      const title=meta("og:title")||doc.title||"";
      const desc=meta("og:description")||meta("description")||"";
      const image=meta("og:image")||"";
      let price="";const pm=(desc+" "+title).match(/\$[\d,]+/);if(pm)price=pm[0].replace(/[$,]/g,"");
      let bed="";const bm=(desc+" "+title).match(/(\d)\s*(?:bed|br|bedroom)/i);if(bm)bed=bm[1]==="0"?"Studio":bm[1]+"BR";
      if(!bed&&(desc+" "+title).match(/studio/i))bed="Studio";
      let address="";const adm=(desc+" "+title).match(/\d+\s+[\w\s]+(?:St|Ave|Blvd|Rd|Dr|Pl|Way|Ct|Ln|Broadway|Street|Avenue)\b[^,]*/i);if(adm)address=adm[0].trim();
      let neighborhood="";const hm=(desc+" "+title).match(/(?:in|at)\s+([\w\s]+?)(?:\s*[,.|]|\s+for\s|\s+\d)/i);if(hm)neighborhood=hm[1].trim();
      const cleanTitle=title.replace(/\s*[-|].*(?:streeteasy|zillow|apartments\.com).*$/i,"").trim();
      return{name:cleanTitle,address,neighborhood,photoUrl:image,price,bed,description:desc.substring(0,200)};
    }catch{}
  }
  return null;
}

// ── Firebase ─────────────────────────────────────────────────────────────────
let fbApp=null,fbDb=null,fbRef=null;

function initFirebase(config,boardId){
  try{
    if(fbApp)fbApp.delete().catch(()=>{});
    fbApp=firebase.initializeApp(config,"borough-"+Date.now());
    fbDb=fbApp.database();
    fbRef=fbDb.ref("boards/"+boardId);
    return true;
  }catch(e){console.error("Firebase init error:",e);return false}
}
function subscribeFirebase(onData){
  if(!fbRef)return ()=>{};
  const cb=fbRef.on("value",snap=>{const v=snap.val();if(v)onData(v)});
  return ()=>fbRef.off("value",cb);
}
function pushFirebase(listings){
  if(!fbRef)return;
  fbRef.set({listings,updatedAt:Date.now()}).catch(e=>console.error("Firebase write error:",e));
}

// ── Helpers ──────────────────────────────────────────────────────────────────

const today=()=>new Date().toISOString().slice(0,10);

// ── Components ───────────────────────────────────────────────────────────────

        {children}

  );
}

function Field({label,children}){

// ── Listing Card (Kanban) ────────────────────────────────────────────────────
function ListingCard({listing,onClick,onDragStart}){
  const stage=STAGE_MAP[listing.stage]||STAGE_MAP.saved;
  const hasNotes=listing.notes&&listing.notes.trim();
  const eventCount=(listing.timeline||[]).length;

  return(
    <div
      draggable
      onDragStart={(e)=>{e.dataTransfer.setData("text/plain",listing.id);onDragStart&&onDragStart(listing.id)}}
      onClick={()=>onClick(listing)}
      style={{
        background:"#161616",border:"1px solid #222",borderRadius:10,padding:14,marginBottom:10,cursor:"grab",
        transition:"all .15s",borderLeft:"3px solid "+stage.color,
      }}
      onMouseEnter={e=>{e.currentTarget.style.borderColor="#444";e.currentTarget.style.background="#1a1a1a"}}
      onMouseLeave={e=>{e.currentTarget.style.borderColor="#222";e.currentTarget.style.background="#161616";e.currentTarget.style.borderLeft="3px solid "+stage.color}}
    >
      {listing.photoUrl&&(
        <div style={{marginBottom:10,borderRadius:6,overflow:"hidden",height:80,background:"#0a0a0a"}}>
          <img src={listing.photoUrl} style={{width:"100%",height:"100%",objectFit:"cover"}} onError={e=>{e.target.style.display="none"}} />
        </div>
      )}
      <div style={{fontSize:14,fontWeight:600,marginBottom:4,lineHeight:1.3}}>{listing.name||"Untitled"}</div>
      {listing.address&&<div style={{fontSize:11,color:"#888",marginBottom:4}}>{listing.address}</div>}
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:8}}>
        {listing.price&&<span style={{fontSize:11,background:"#1a2a1a",color:"#34d399",padding:"2px 8px",borderRadius:4,fontWeight:500}}>${Number(listing.price).toLocaleString()}/mo</span>}
        {listing.bed&&<span style={{fontSize:11,background:"#1a1a2a",color:"#818cf8",padding:"2px 8px",borderRadius:4}}>{listing.bed}</span>}
        {listing.neighborhood&&<span style={{fontSize:11,background:"#1a1a1a",color:"#888",padding:"2px 8px",borderRadius:4}}>{listing.neighborhood}</span>}
      </div>
      {(hasNotes||eventCount>0)&&(
        <div style={{display:"flex",gap:8,marginTop:8,fontSize:10,color:"#555"}}>
          {hasNotes&&<span>📝 has notes</span>}
          {eventCount>0&&<span>📋 {eventCount} update{eventCount>1?"s":""}</span>}
        </div>
      )}
    </div>
  );
}

// ── Add Listing Modal ────────────────────────────────────────────────────────
function AddListingModal({onClose,onAdd}){
  const[form,setForm]=useState({name:"",address:"",neighborhood:"",url:"",price:"",bed:"",bath:"",notes:"",photoUrl:""});
  const[scraping,setScraping]=useState(false);
  const[scraped,setScraped]=useState(false);

  const set=(k,v)=>setForm(p=>({...p,[k]:v}));

  const handleUrlPaste=async(e)=>{
    const url=e.target.value;
    set("url",url);
    if(!url.startsWith("http"))return;
    // Instant URL parsing
    const hints=parseUrlHints(url);
    setForm(p=>({...p,url,name:hints.name||p.name,address:hints.address||p.address,neighborhood:hints.neighborhood||p.neighborhood,bed:hints.bed||p.bed,price:hints.price||p.price}));
    // Async scrape
    setScraping(true);
    const data=await scrapeUrl(url);
    setScraping(false);
    if(data){
      setScraped(true);
      setForm(p=>({...p,name:data.name||p.name,address:data.address||p.address,neighborhood:data.neighborhood||p.neighborhood,price:data.price||p.price,bed:data.bed||p.bed,photoUrl:data.photoUrl||p.photoUrl}));
      setTimeout(()=>setScraped(false),2000);
    }
  };

  const submit=()=>{
    if(!form.name&&!form.url)return;
    onAdd({
      ...form,
      id:uid(),
      stage:"saved",
      timeline:[{event:"saved",date:today(),note:"Added to board"}],
      createdAt:today(),
    });
    onClose();
  };

  return(
    <Modal title="Add Listing" onClose={onClose} wide>
      <Field label="Listing URL (StreetEasy, Zillow, etc.)">
        <div style={{position:"relative"}}>
          <input value={form.url} onChange={handleUrlPaste} placeholder="Paste a link to auto-fill details..." />
          {scraping&&<span style={{position:"absolute",right:12,top:10,fontSize:11,color:"#38bdf8",animation:"pulse 1s infinite"}}>Fetching...</span>}
          {scraped&&<span style={{position:"absolute",right:12,top:10,fontSize:11,color:"#34d399"}}>✓ Filled</span>}
        </div>
      </Field>
      <Field label="Name"><input value={form.name} onChange={e=>set("name",e.target.value)} placeholder="e.g. The Windermere" /></Field>
      <Field label="Address"><input value={form.address} onChange={e=>set("address",e.target.value)} placeholder="e.g. 400 West 57th Street" /></Field>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
        <Field label="Neighborhood"><input value={form.neighborhood} onChange={e=>set("neighborhood",e.target.value)} placeholder="e.g. Hell's Kitchen" /></Field>
        <Field label="Price ($/mo)"><input value={form.price} onChange={e=>set("price",e.target.value)} placeholder="3500" /></Field>
        <Field label="Bedrooms"><input value={form.bed} onChange={e=>set("bed",e.target.value)} placeholder="Studio, 1BR..." /></Field>
      </div>
      <Field label="Notes"><textarea value={form.notes} onChange={e=>set("notes",e.target.value)} rows={2} placeholder="First impressions, broker contact, etc." /></Field>
      <button onClick={submit} style={{width:"100%",padding:12,background:"#fff",color:"#000",fontWeight:600,borderRadius:8,fontSize:13,marginTop:4}}>Add to Saved</button>
    </Modal>
  );
}

// ── Listing Detail Modal ─────────────────────────────────────────────────────
function DetailModal({listing,onClose,onUpdate,onDelete,username}){

  const[newTimelineNote,setNewTimelineNote]=useState("");
  const[editing,setEditing]=useState(false);
  const[editingAgent,setEditingAgent]=useState(false);
  const[form,setForm]=useState({...listing});
  const[agentForm,setAgentForm]=useState(listing.agent||{name:"",phone:"",email:"",company:""});
  const[tab,setTab]=useState("details");
  const stage=STAGE_MAP[listing.stage]||STAGE_MAP.saved;
  const dropRef=useRef(null);

  const addComment=()=>{
    if(!newComment.trim())return;
    const comments=[...(listing.comments||[]),{id:uid(),text:newComment.trim(),author:username,date:today(),time:new Date().toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"})}];
    onUpdate({...listing,comments});
    setNewComment("");
  };

  const addTimelineEvent=(note)=>{
    if(!note.trim())return;
    const tl=[...(listing.timeline||[]),{event:listing.stage,date:today(),note:note.trim(),author:username}];
    onUpdate({...listing,timeline:tl});
    setNewTimelineNote("");
  };

  const moveToStage=(stageId)=>{
    const stageInfo=STAGE_MAP[stageId];
    const tl=[...(listing.timeline||[]),{event:stageId,date:today(),note:"Moved to "+stageInfo.label,author:username}];
    onUpdate({...listing,stage:stageId,timeline:tl});
  };

  const saveEdit=()=>{
    onUpdate({...listing,...form});
    setEditing(false);
  };

  const saveAgent=()=>{
    onUpdate({...listing,agent:agentForm});
    setEditingAgent(false);
  };

  // Multi-file screenshot upload
  const handleScreenshots=(e)=>{
    const files=Array.from(e.target.files);
    files.forEach(file=>{
      const reader=new FileReader();
      reader.onload=(ev)=>{
        onUpdate(prev=>{
          const current=prev||listing;
          return{...current,screenshots:[...(current.screenshots||[]),{id:uid(),data:ev.target.result,name:file.name,date:today()}]};
        });
      };
      reader.readAsDataURL(file);
    });
  };
  // Actually we need a simpler approach for multi-file since onUpdate expects the full object
  const handlePhotoUpload=(e)=>{
    const files=Array.from(e.target.files);
    let screenshots=[...(listing.screenshots||[])];
    let loaded=0;
    files.forEach(file=>{
      const reader=new FileReader();
      reader.onload=(ev)=>{

        loaded++;
        if(loaded===files.length){
          onUpdate({...listing,screenshots});
        }
      };
      reader.readAsDataURL(file);
    });
  };

  const deleteScreenshot=(ssId)=>{
    onUpdate({...listing,screenshots:(listing.screenshots||[]).filter(s=>s.id!==ssId)});
  };

  // Drag and drop photos
  const handleDrop=(e)=>{
    e.preventDefault();
    const files=Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith("image/"));
    if(!files.length)return;
    let screenshots=[...(listing.screenshots||[])];
    let loaded=0;
    files.forEach(file=>{
      const reader=new FileReader();
      reader.onload=(ev)=>{
        screenshots=[...screenshots,{id:uid(),data:ev.target.result,name:file.name,date:today()}];
        loaded++;
        if(loaded===files.length) onUpdate({...listing,screenshots});
      };
      reader.readAsDataURL(file);
    });
  };

  const agent=listing.agent||{};
  const comments=listing.comments||[];
  const tabs=[{id:"details",label:"Details"},{id:"notes",label:"Notes ("+comments.length+")"},{id:"photos",label:"Photos ("+(listing.screenshots||[]).length+")"},{id:"timeline",label:"Timeline"}];

  return(
    <Modal title="" onClose={onClose} wide>
      {/* Header */}
      <div style={{marginBottom:16,marginTop:-8}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
          <span style={{background:stage.color+"22",color:stage.color,padding:"3px 10px",borderRadius:6,fontSize:11,fontWeight:600}}>{stage.emoji} {stage.label}</span>
          {listing.url&&<a href={listing.url} target="_blank" style={{fontSize:11,color:"#38bdf8",textDecoration:"none"}}>View listing ↗</a>}
        </div>
        {editing?(

              <button onClick={saveEdit} style={{padding:"6px 16px",background:"#fff",color:"#000",borderRadius:6,fontSize:12,fontWeight:500}}>Save</button>
              <button onClick={()=>setEditing(false)} style={{padding:"6px 16px",background:"#222",color:"#888",borderRadius:6,fontSize:12}}>Cancel</button>
            </div>
          </div>
        ):(
          <div>
            <h2 style={{fontSize:20,fontWeight:700,marginBottom:4}}>{listing.name||"Untitled"}</h2>
            {listing.address&&<div style={{fontSize:13,color:"#888"}}>{listing.address}</div>}
            <div style={{display:"flex",gap:10,marginTop:8,flexWrap:"wrap",alignItems:"center"}}>
              {listing.price&&<span style={{fontSize:13,color:"#34d399",fontWeight:600}}>${Number(listing.price).toLocaleString()}/mo</span>}

      )}

      {/* Move to Stage */}
      <div style={{marginBottom:16}}>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {STAGES.map(s=>(
            <button key={s.id} onClick={()=>moveToStage(s.id)}
              style={{
                padding:"5px 12px",borderRadius:6,fontSize:11,fontWeight:500,
                background:listing.stage===s.id?s.color+"33":"#1a1a1a",
                color:listing.stage===s.id?s.color:"#555",
                border:listing.stage===s.id?"1px solid "+s.color+"55":"1px solid #1a1a1a",
              }}>
              {s.emoji} {s.label}
            </button>
          ))}
        </div>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",gap:0,borderBottom:"1px solid #222",marginBottom:16}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{
            padding:"8px 16px",fontSize:12,fontWeight:tab===t.id?600:400,
            color:tab===t.id?"#fff":"#555",background:"none",
            borderBottom:tab===t.id?"2px solid #fff":"2px solid transparent",
          }}>{t.label}</button>
        ))}
      </div>

      {/* Details Tab */}
      {tab==="details"&&(
        <div>
          {/* Agent / Broker Contact */}
          <div style={{marginBottom:20}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <div style={{fontSize:11,color:"#666",fontWeight:500,textTransform:"uppercase",letterSpacing:".5px"}}>Agent / Broker</div>
              <button onClick={()=>setEditingAgent(!editingAgent)} style={{fontSize:11,color:"#555",background:"none",textDecoration:"underline"}}>{editingAgent?"cancel":"edit"}</button>
            </div>
            {editingAgent?(
              <div style={{background:"#0f0f0f",borderRadius:8,padding:14}}>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                  <Field label="Name"><input value={agentForm.name} onChange={e=>setAgentForm(p=>({...p,name:e.target.value}))} placeholder="Agent name" /></Field>
                  <Field label="Company"><input value={agentForm.company} onChange={e=>setAgentForm(p=>({...p,company:e.target.value}))} placeholder="Brokerage" /></Field>
                  <Field label="Phone"><input value={agentForm.phone} onChange={e=>setAgentForm(p=>({...p,phone:e.target.value}))} placeholder="(555) 123-4567" /></Field>
                  <Field label="Email"><input value={agentForm.email} onChange={e=>setAgentForm(p=>({...p,email:e.target.value}))} placeholder="agent@email.com" /></Field>
                </div>
                <button onClick={saveAgent} style={{padding:"6px 16px",background:"#fff",color:"#000",borderRadius:6,fontSize:12,fontWeight:500,marginTop:4}}>Save Contact</button>
              </div>
            ):(
              <div style={{background:"#0f0f0f",borderRadius:8,padding:14}}>
                {agent.name?(
                  <div>
                    <div style={{fontSize:14,fontWeight:600,marginBottom:2}}>{agent.name}</div>
                    {agent.company&&<div style={{fontSize:12,color:"#888",marginBottom:6}}>{agent.company}</div>}
                    <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                      {agent.phone&&<a href={"tel:"+agent.phone} style={{fontSize:12,color:"#38bdf8",textDecoration:"none"}}>📞 {agent.phone}</a>}
                      {agent.email&&<a href={"mailto:"+agent.email} style={{fontSize:12,color:"#38bdf8",textDecoration:"none"}}>✉ {agent.email}</a>}
                    </div>
                  </div>
                ):(
                  <div style={{fontSize:12,color:"#444",textAlign:"center",padding:8}}>No agent info yet — click edit to add</div>
                )}
              </div>
            )}
          </div>

          {/* Quick Info */}
          {listing.description&&(
            <div style={{marginBottom:16}}>
              <div style={{fontSize:11,color:"#666",fontWeight:500,textTransform:"uppercase",letterSpacing:".5px",marginBottom:6}}>Description</div>
              <div style={{fontSize:12,color:"#888",lineHeight:1.6}}>{listing.description}</div>
            </div>
          )}

          {/* Delete */}
          <button onClick={()=>{if(confirm("Delete this listing permanently?"))onDelete(listing.id)}} style={{width:"100%",padding:10,background:"#1a1111",color:"#ef4444",borderRadius:6,fontSize:12,border:"1px solid #2a1515",marginTop:8}}>Delete listing</button>
        </div>
      )}

      {/* Notes Tab — collaborative, name-tagged */}
      {tab==="notes"&&(
        <div>
          <div style={{display:"flex",gap:8,marginBottom:16}}>
            <input value={newComment} onChange={e=>setNewComment(e.target.value)} placeholder={"Add a note as "+username+"..."} onKeyDown={e=>{if(e.key==="Enter")addComment()}} style={{flex:1}} />
            <button onClick={addComment} style={{padding:"8px 16px",background:"#222",color:"#fff",borderRadius:6,fontSize:12,whiteSpace:"nowrap"}}>Post</button>
          </div>
          {comments.length===0&&<div style={{fontSize:12,color:"#333",textAlign:"center",padding:20}}>No notes yet. Be the first to add one!</div>}
          {comments.slice().reverse().map(c=>(
            <div key={c.id} style={{marginBottom:12,padding:12,background:"#0f0f0f",borderRadius:8,borderLeft:"3px solid "+(c.author===username?"#38bdf8":"#a78bfa")}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                <span style={{fontSize:12,fontWeight:600,color:c.author===username?"#38bdf8":"#a78bfa"}}>{c.author}</span>
                <span style={{fontSize:10,color:"#444"}}>{fmtDate(c.date)} {c.time||""}</span>
              </div>
              <div style={{fontSize:13,color:"#ccc",lineHeight:1.5}}>{c.text}</div>
            </div>
          ))}
        </div>
      )}

      {/* Photos Tab */}
      {tab==="photos"&&(
        <div>
          <div
            ref={dropRef}
            onDragOver={e=>{e.preventDefault();e.currentTarget.style.borderColor="#555";e.currentTarget.style.background="#0f0f0f"}}
            onDragLeave={e=>{e.currentTarget.style.borderColor="#333";e.currentTarget.style.background="transparent"}}
            onDrop={e=>{e.currentTarget.style.borderColor="#333";e.currentTarget.style.background="transparent";handleDrop(e)}}
            style={{border:"2px dashed #333",borderRadius:8,padding:24,textAlign:"center",cursor:"pointer",marginBottom:16,transition:"all .15s"}}
          >
            <label style={{cursor:"pointer"}}>
              <div style={{fontSize:13,color:"#666",marginBottom:4}}>Drop images here or click to upload</div>
              <div style={{fontSize:11,color:"#444"}}>Supports multiple files</div>
              <input type="file" accept="image/*" multiple onChange={handlePhotoUpload} style={{display:"none"}} />
            </label>
          </div>
          {(listing.screenshots||[]).length===0&&!listing.photoUrl&&(
            <div style={{fontSize:12,color:"#333",textAlign:"center",padding:20}}>No photos yet</div>
          )}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            {(listing.screenshots||[]).map(ss=>(
              <div key={ss.id} style={{borderRadius:8,overflow:"hidden",border:"1px solid #222",position:"relative"}}>
                <img src={ss.data} style={{width:"100%",display:"block"}} />
                <button onClick={()=>deleteScreenshot(ss.id)} style={{position:"absolute",top:4,right:4,background:"rgba(0,0,0,.7)",color:"#ef4444",borderRadius:4,width:20,height:20,fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
                <div style={{padding:6,fontSize:10,color:"#555"}}>{fmtDate(ss.date)}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Timeline Tab */}
      {tab==="timeline"&&(
        <div>
          <div style={{display:"flex",gap:8,marginBottom:16}}>
            <input value={newTimelineNote} onChange={e=>setNewTimelineNote(e.target.value)} placeholder="Log an update..." onKeyDown={e=>{if(e.key==="Enter")addTimelineEvent(newTimelineNote)}} style={{flex:1}} />
            <button onClick={()=>addTimelineEvent(newTimelineNote)} style={{padding:"8px 16px",background:"#222",color:"#fff",borderRadius:6,fontSize:12}}>Add</button>
          </div>
          {(listing.timeline||[]).length===0&&<div style={{fontSize:12,color:"#333",textAlign:"center",padding:20}}>No activity yet</div>}
          {(listing.timeline||[]).slice().reverse().map((ev,i)=>{
            const evStage=STAGE_MAP[ev.event];
            return(
              <div key={i} style={{display:"flex",gap:10,marginBottom:12,fontSize:12}}>
                <div style={{color:"#333",minWidth:55,textAlign:"right",flexShrink:0}}>{fmtDate(ev.date)}</div>
                <div style={{width:8,height:8,borderRadius:"50%",background:evStage?evStage.color:"#444",marginTop:5,flexShrink:0}} />
                <div>
                  <span style={{color:"#aaa"}}>{ev.note}</span>
                  {ev.author&&<span style={{color:"#555",marginLeft:6}}>— {ev.author}</span>}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </Modal>
  );
}

// ── Share Modal ──────────────────────────────────────────────────────────────
function ShareModal({onClose,connected,boardId}){
  return(
    <Modal title="Share Board" onClose={onClose}>
      <div style={{padding:16,background:connected?"rgba(52,211,153,.05)":"rgba(239,68,68,.05)",border:"1px solid "+(connected?"rgba(52,211,153,.15)":"rgba(239,68,68,.15)"),borderRadius:8,marginBottom:16}}>
        <div style={{fontSize:13,color:connected?"#34d399":"#ef4444",fontWeight:500,marginBottom:4}}>
          {connected?"● Connected & syncing":"● Not connected"}
        </div>
        <div style={{fontSize:11,color:"#555",marginTop:4}}>Board ID: <span style={{color:"#fff",fontWeight:500}}>{boardId}</span></div>
      </div>
      <div style={{background:"#0f0f0f",borderRadius:8,padding:16,fontSize:12,color:"#888",lineHeight:1.8}}>
        <div style={{color:"#ccc",fontWeight:500,marginBottom:6}}>How to share:</div>
        Send your partner this link:<br/>
        <code style={{color:"#38bdf8",fontSize:11}}>borough-dfc1d.web.app</code><br/>
        Changes sync automatically in real-time.
      </div>
    </Modal>
  );
}

// ── Username Prompt ──────────────────────────────────────────────────────────
function UsernamePrompt({onSet}){
  const[name,setName]=useState("");
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9999,backdropFilter:"blur(6px)"}}>
      <div className="fade" style={{background:"#111",border:"1px solid #222",borderRadius:12,padding:32,width:360,textAlign:"center"}}>
        <h2 style={{fontSize:20,fontWeight:700,marginBottom:8}}>Welcome to Borough</h2>
        <p style={{fontSize:13,color:"#888",marginBottom:20}}>What's your name? This will show on your notes and updates.</p>
        <input value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&name.trim())onSet(name.trim())}} placeholder="Your first name" style={{textAlign:"center",fontSize:15,marginBottom:12}} autoFocus />
        <button onClick={()=>{if(name.trim())onSet(name.trim())}} style={{width:"100%",padding:12,background:"#fff",color:"#000",fontWeight:600,borderRadius:8,fontSize:13}}>Continue</button>
      </div>
    </div>
  );
}

// ── App ──────────────────────────────────────────────────────────────────────
function App(){
  const[data,setDataRaw]=useState(loadLocal);
  const[modal,setModal]=useState(null);
  const[selected,setSelected]=useState(null);
  const[fbConnected,setFbConnected]=useState(false);
  const[dragging,setDragging]=useState(null);
  const[username,setUsernameState]=useState(()=>localStorage.getItem("borough-username")||"");
  const setUsername=(name)=>{localStorage.setItem("borough-username",name);setUsernameState(name)};

  const setData=useCallback((fn)=>{
    setDataRaw(prev=>{
      const next=typeof fn==="function"?fn(prev):fn;
      saveLocal(next);
      if(fbConnected)pushFirebase(next.listings);
      return next;
    });
  },[fbConnected]);

  // Firebase subscription
  useEffect(()=>{
    if(!data.firebaseConfig||!data.boardId)return;
    const ok=initFirebase(data.firebaseConfig,data.boardId);
    if(!ok)return;
    setFbConnected(true);
    const unsub=subscribeFirebase((remote)=>{
      setDataRaw(prev=>{
        const next={...prev,listings:remote.listings||[]};
        saveLocal(next);
        return next;
      });
    });
    return ()=>{unsub();setFbConnected(false)};
  },[]);

  const listings=data.listings||[];

  const addListing=(listing)=>{
    setData(prev=>({...prev,listings:[...prev.listings,listing]}));
  };

  const updateListing=(updated)=>{
    setData(prev=>({...prev,listings:prev.listings.map(l=>l.id===updated.id?updated:l)}));
    setSelected(updated);
  };

  const deleteListing=(id)=>{
    setData(prev=>({...prev,listings:prev.listings.filter(l=>l.id!==id)}));
    setSelected(null);
  };

  const handleDrop=(listingId,newStageId)=>{
    const listing=listings.find(l=>l.id===listingId);
    if(!listing||listing.stage===newStageId)return;
    const stageInfo=STAGE_MAP[newStageId];
    const tl=[...(listing.timeline||[]),{event:newStageId,date:today(),note:"Moved to "+stageInfo.label}];
    const updated={...listing,stage:newStageId,timeline:tl};
    setData(prev=>({...prev,listings:prev.listings.map(l=>l.id===listingId?updated:l)}));
    setDragging(null);
  };

  if(!username) return <UsernamePrompt onSet={setUsername} />;

  return(
    <div style={{height:"100vh",display:"flex",flexDirection:"column"}}>
      {/* Top Bar */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 20px",borderBottom:"1px solid #1a1a1a",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <h1 style={{fontSize:18,fontWeight:700,letterSpacing:"-0.5px"}}>Borough</h1>
          {fbConnected&&<span style={{fontSize:10,color:"#34d399",fontWeight:500}}>● synced</span>}
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <span style={{fontSize:11,color:"#555"}}>{username}</span>
          <button onClick={()=>setModal("share")} style={{padding:"7px 14px",background:"#161616",color:"#888",borderRadius:6,fontSize:12,border:"1px solid #222"}}>Share</button>
          <button onClick={()=>setModal("add")} style={{padding:"7px 14px",background:"#fff",color:"#000",borderRadius:6,fontSize:12,fontWeight:600}}>+ Add Listing</button>
        </div>
      </div>

      {/* Kanban Board */}
      <div style={{display:"flex",gap:12,padding:"16px 20px",flex:1,overflowX:"auto"}}>
        {STAGES.map(stage=>(
          <KanbanColumn
            key={stage.id}
            stage={stage}
            listings={listings.filter(l=>(l.stage||"saved")===stage.id)}
            onCardClick={(l)=>setSelected(l)}
            onDrop={handleDrop}
            onDragStart={setDragging}
          />
        ))}
      </div>

      {/* Modals */}
      {modal==="add"&&<AddListingModal onClose={()=>setModal(null)} onAdd={addListing} />}
      {modal==="share"&&<ShareModal onClose={()=>setModal(null)} connected={fbConnected} boardId={data.boardId} />}
      {selected&&<DetailModal listing={listings.find(l=>l.id===selected.id)||selected} onClose={()=>setSelected(null)} onUpdate={updateListing} onDelete={deleteListing} username={username} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
